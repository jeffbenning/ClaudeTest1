<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Walk & Jump</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; height: 100vh; }
    canvas { display: block; border-radius: 12px; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  canvas.width = 800;
  canvas.height = 400;

  const GROUND = canvas.height - 60;
  const GRAVITY = 0.6;
  const JUMP_FORCE = -13;
  const SPEED = 4;

  const keys = {};
  document.addEventListener('keydown', e => keys[e.code] = true);
  document.addEventListener('keyup',   e => keys[e.code] = false);

  const player = {
    x: canvas.width / 2,
    y: GROUND,
    w: 32,
    h: 48,
    vx: 0,
    vy: 0,
    onGround: false,
    facing: 1,
    frame: 0,
    frameTimer: 0,
  };

  function update() {
    // Horizontal movement
    if (keys['ArrowLeft'] || keys['KeyA']) {
      player.vx = -SPEED;
      player.facing = -1;
    } else if (keys['ArrowRight'] || keys['KeyD']) {
      player.vx = SPEED;
      player.facing = 1;
    } else {
      player.vx = 0;
    }

    // Jump
    if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && player.onGround) {
      player.vy = JUMP_FORCE;
      player.onGround = false;
    }

    // Gravity
    player.vy += GRAVITY;
    player.x += player.vx;
    player.y += player.vy;

    // Ground collision
    if (player.y >= GROUND) {
      player.y = GROUND;
      player.vy = 0;
      player.onGround = true;
    }

    // Wall clamp
    player.x = Math.max(player.w / 2, Math.min(canvas.width - player.w / 2, player.x));

    // Walking animation frame
    if (player.vx !== 0 && player.onGround) {
      player.frameTimer++;
      if (player.frameTimer > 8) { player.frame = (player.frame + 1) % 4; player.frameTimer = 0; }
    } else if (player.onGround) {
      player.frame = 0;
    }
  }

  function drawBackground() {
    // Sky gradient
    const sky = ctx.createLinearGradient(0, 0, 0, GROUND);
    sky.addColorStop(0, '#0f2027');
    sky.addColorStop(1, '#203a43');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Ground
    ctx.fillStyle = '#2c5f2e';
    ctx.fillRect(0, GROUND + player.h, canvas.width, canvas.height - GROUND - player.h);

    // Ground line
    ctx.fillStyle = '#4a8c4e';
    ctx.fillRect(0, GROUND + player.h, canvas.width, 6);

    // Stars
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    const stars = [[50,30],[150,80],[300,20],[480,60],[620,40],[720,90],[200,110],[550,15]];
    stars.forEach(([sx, sy]) => { ctx.beginPath(); ctx.arc(sx, sy, 1.5, 0, Math.PI*2); ctx.fill(); });
  }

  function drawPlayer() {
    const x = player.x;
    const y = player.y + player.h;  // bottom of player
    const f = player.facing;
    const leg = player.onGround ? Math.sin(player.frame * Math.PI / 2) * 8 : 0;

    ctx.save();
    ctx.translate(x, y);
    ctx.scale(f, 1);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, 2, 18, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Left leg
    ctx.fillStyle = '#3a86ff';
    ctx.beginPath();
    ctx.roundRect(-10, -16 + leg, 9, 16, 4);
    ctx.fill();

    // Right leg
    ctx.beginPath();
    ctx.roundRect(1, -16 - leg, 9, 16, 4);
    ctx.fill();

    // Body
    ctx.fillStyle = '#ff6b6b';
    ctx.beginPath();
    ctx.roundRect(-13, -40, 26, 26, 6);
    ctx.fill();

    // Eyes
    ctx.fillStyle = 'white';
    ctx.beginPath(); ctx.arc(5, -28, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(6, -28, 2.5, 0, Math.PI * 2); ctx.fill();

    // Mouth (smile or open if jumping)
    ctx.strokeStyle = '#222';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    if (!player.onGround) {
      ctx.arc(2, -23, 3, 0, Math.PI * 2);
    } else {
      ctx.arc(2, -26, 3, 0.2, Math.PI - 0.2);
    }
    ctx.stroke();

    // Arm
    ctx.fillStyle = '#ff6b6b';
    const armSwing = player.onGround ? -leg * 0.5 : -10;
    ctx.save();
    ctx.translate(-13, -35);
    ctx.rotate(armSwing * 0.05);
    ctx.beginPath();
    ctx.roundRect(-7, 0, 7, 18, 4);
    ctx.fill();
    ctx.restore();

    ctx.restore();
  }

  function drawHints() {
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '13px monospace';
    ctx.fillText('← → to move   Space to jump', 10, 20);
  }

  function loop() {
    update();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawBackground();
    drawPlayer();
    drawHints();
    requestAnimationFrame(loop);
  }

  loop();
</script>
</body>
</html>
